name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Install ReportGenerator
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Run Rust tests
        run: cargo test

      - name: Run .NET worker tests
        run: dotnet test MLVInspector.Worker.Tests.csproj

      - name: Generate coverage reports
        run: .\scripts\run-coverage.ps1
        shell: pwsh

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli

      - name: Build .NET Worker
        run: dotnet build MLVInspector.Worker/ILInspector.Worker.csproj -c Release -r win-x64
        shell: bash

      - name: Publish .NET Worker
        run: dotnet publish MLVInspector.Worker/ILInspector.Worker.csproj -c Release -r win-x64 -o worker-publish --no-build
        shell: bash

      - name: Build Dioxus App
        run: dx build --platform desktop --release

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp -r target/release/mlvinspector.exe artifacts/ 2>/dev/null || cp -r dist/MLVInspector/* artifacts/ 2>/dev/null || true
          cp -r worker-publish/* artifacts/ 2>/dev/null || true
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MLVInspector-windows
          path: artifacts/
          retention-days: 7

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MLVInspector-coverage
          path: coverage/
          retention-days: 7
